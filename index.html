                // 设备名称文本
                const nameText = document.createElement('span');
                nameText.textContent = deviceName;
                
                // 组装标签
                label.appendChild(statusIndicator);
                label.appendChild(nameText);
                
                const container = document.getElementById('canvas-container');
                if (container) {
                    container.appendChild(label);
                }
                
                return label;
            }
            
            // 更新标签位置
            function updateLabelPosition(label, position) {
                if (!label || !position) return;
                
                const vector = new THREE.Vector3(position.x, position.y + 1.2, position.z);
                vector.project(camera);
                
                const canvas = renderer.domElement;
                const x = (vector.x * 0.5 + 0.5) * canvas.clientWidth;
                const y = (-vector.y * 0.5 + 0.5) * canvas.clientHeight;
                
                label.style.left = `${x - label.offsetWidth / 2}px`;
                label.style.top = `${y - 40}px`;
            }
            
            // 移除标签
            function removeLabel() {
                if (hoverLabel) {
                    const container = document.getElementById('canvas-container');
                    if (container && hoverLabel.parentNode === container) {
                        container.removeChild(hoverLabel);
                    }
                    hoverLabel = null;
                }
            }
            
            // 鼠标移动事件处理 - 用于全息效果和设备标签
            function onMouseMove(event) {
                // 计算鼠标在屏幕上的位置
                const canvas = renderer.domElement;
                const rect = canvas.getBoundingClientRect();
                
                mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                
                // 更新射线
                raycaster.setFromCamera(mouse, camera);
                
                // 计算射线与所有可点击对象的交点
                const intersects = raycaster.intersectObjects(scene.children, true);
                
                // 检查是否有交点
                let currentHoveredObject = null;
                let currentIntersect = null;
                for (let i = 0; i < intersects.length; i++) {
                    const intersect = intersects[i];
                    const object = intersect.object;
                    
                    // 检查对象是否可点击
                    if (object.userData.clickable && object.userData.deviceId) {
                        currentHoveredObject = object;
                        currentIntersect = intersect;
                        break;
                    }
                }
                
                // 恢复之前悬停的对象的材质
                if (hoveredObject && hoveredObject !== currentHoveredObject) {
                    // 如果是故障设备，恢复到故障全息效果
                    if (hoveredObject.userData.isFaulty) {
                        const deviceId = hoveredObject.userData.deviceId;
                        const deviceConfig = deviceConfigs.find(config => config.id === deviceId);
                        if (deviceConfig) {
                            const color = deviceConfig.status === 'red' ? 0xff3333 : 0xffff33;
                            const faultHologramMaterial = new THREE.MeshPhongMaterial({
                                color: color,
                                transparent: true,
                                opacity: 0.6,
                                side: THREE.DoubleSide,
                                shininess: 100,
                                specular: 0xffffff
                            });
                            // 应用到所有子对象
                            applyMaterialToChildren(hoveredObject, faultHologramMaterial);
                        }
                    } else {
                        // 正常设备恢复原始材质
                        if (hoveredObject.userData.hoverOriginalMaterial) {
                            restoreHoverOriginalMaterials(hoveredObject);
                            // 清除悬停材质标记
                            hoveredObject.userData.hoverOriginalMaterial = null;
                        }
                    }
                    removeLabel();
                }
                
                // 为当前悬停的对象添加全息透明效果和标签
                if (currentHoveredObject && currentHoveredObject !== hoveredObject) {
                    // 检查是否是故障设备，如果是则跳过悬停效果
                    if (!currentHoveredObject.userData.isFaulty) {
                        // 保存原始材质（如果还没保存）
                        if (!currentHoveredObject.userData.hoverOriginalMaterial) {
                            saveHoverOriginalMaterials(currentHoveredObject);
                        }
                        
                        // 创建全息透明材质
                        const hologramMaterial = new THREE.MeshPhongMaterial({
                            color: 0x00d5ff,
                            transparent: true,
                            opacity: 0.6,
                            side: THREE.DoubleSide,
                            shininess: 100,
                            specular: 0xffffff
                        });
                        
                        // 应用到所有子对象
                        applyMaterialToChildren(currentHoveredObject, hologramMaterial);
                    }
                    
                    // 创建并显示设备标签
                    const deviceId = currentHoveredObject.userData.deviceId;
                    const deviceConfig = deviceConfigs.find(config => config.id === deviceId);
                    if (deviceConfig) {
                        hoverLabel = createDeviceLabel(deviceConfig.name, deviceId, currentIntersect.point);
                        updateLabelPosition(hoverLabel, currentIntersect.point);
                    }
                } else if (currentHoveredObject && hoverLabel) {
                    // 更新标签位置
                    updateLabelPosition(hoverLabel, currentIntersect.point);
                    
                    // 更新标签状态
                    const deviceId = currentHoveredObject.userData.deviceId;
                    const deviceConfig = deviceConfigs.find(config => config.id === deviceId);
                    const statusIndicator = hoverLabel.querySelector('.device-status-indicator');
                    if (statusIndicator) {
                        // 设备故障/警告状态优先显示
                        if (deviceConfig && deviceConfig.status === 'red') {
                            statusIndicator.style.background = '#f87171';
                            statusIndicator.style.color = '#f87171';
                        } else if (deviceConfig && deviceConfig.status === 'yellow') {
                            statusIndicator.style.background = '#facc15';
                            statusIndicator.style.color = '#facc15';
                        } else {
                            // 正常设备根据系统状态显示
                            if (state.status === 'paused') {
                                statusIndicator.style.background = '#facc15';
                                statusIndicator.style.color = '#facc15';
                            } else if (state.status === 'stopped' || state.status === 'idle') {
                                statusIndicator.style.background = '#94a3b8';
                                statusIndicator.style.color = '#94a3b8';
                            } else {
                                statusIndicator.style.background = '#4ade80';
                                statusIndicator.style.color = '#4ade80';
                            }
                        }
                    }
                }
                
                // 更新悬停对象
                hoveredObject = currentHoveredObject;
                
                // 更新鼠标样式
                if (currentHoveredObject) {
                    renderer.domElement.style.cursor = 'pointer';
                } else {
                    renderer.domElement.style.cursor = 'default';
                }
            }
            
            // 鼠标离开画布事件处理
            function onMouseLeave() {
                // 恢复悬停对象的材质
                if (hoveredObject) {
                    // 如果是故障设备，恢复到故障全息效果
                    if (hoveredObject.userData.isFaulty) {
                        const deviceId = hoveredObject.userData.deviceId;
                        const deviceConfig = deviceConfigs.find(config => config.id === deviceId);
                        if (deviceConfig) {
                            const color = deviceConfig.status === 'red' ? 0xff3333 : 0xffff33;
                            const faultHologramMaterial = new THREE.MeshPhongMaterial({
                                color: color,
                                transparent: true,
                                opacity: 0.6,
                                side: THREE.DoubleSide,
                                shininess: 100,
                                specular: 0xffffff
                            });
                            // 应用到所有子对象
                            applyMaterialToChildren(hoveredObject, faultHologramMaterial);
                        }
                    } else {
                        // 正常设备恢复原始材质
                        if (hoveredObject.userData.hoverOriginalMaterial) {
                            restoreHoverOriginalMaterials(hoveredObject);
                            // 清除悬停材质标记
                            hoveredObject.userData.hoverOriginalMaterial = null;
                        }
                    }
                }
                
                // 移除标签
                removeLabel();
                
                hoveredObject = null;
                renderer.domElement.style.cursor = 'default';
            }
            
            // 鼠标点击事件处理
            function onMouseClick(event) {
                // 计算鼠标在屏幕上的位置
                const canvas = renderer.domElement;
                const rect = canvas.getBoundingClientRect();
                
                mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                
                // 更新射线
                raycaster.setFromCamera(mouse, camera);
                
                // 计算射线与所有可点击对象的交点
                const intersects = raycaster.intersectObjects(scene.children, true);
                
                // 检查是否有交点
                for (let i = 0; i < intersects.length; i++) {
                    const intersect = intersects[i];
                    const object = intersect.object;
                    
                    // 检查对象是否可点击
                    if (object.userData.clickable && object.userData.deviceId) {
                        const deviceId = object.userData.deviceId;
                        const deviceConfig = deviceConfigs.find(config => config.id === deviceId);
                        
                        if (deviceConfig) {
                            // 切换悬浮面板
                            const container = createFloatingPanelsContainer();
                            toggleFloatingPanel(deviceId, deviceConfig.name, intersect.point);
                            break;
                        }
                    }
                }
            }
            
            // 添加鼠标事件监听器
            renderer.domElement.addEventListener('mousemove', onMouseMove);
            renderer.domElement.addEventListener('mouseleave', onMouseLeave);
            renderer.domElement.addEventListener('click', onMouseClick);
            
            console.log('点击事件处理已设置');
        }
        
        function createFallbackDeviceModel(device) {
            console.log(`为 ${device.name} 创建备用几何体`);
            const group = new THREE.Group();

                color: 0x3b82f6, 
                metalness: 0.7, 
                roughness: 0.3
            });
            const main = new THREE.Mesh(mainGeo, mainMat);
            main.position.set(0, 0.25, 0);

            });

        function adjustCameraForDevices() {
            console.log('调整相机位置以查看所有设备');
            
            // 计算所有设备的边界
            const box = new THREE.Box3();
            
            // 包含主模型
            if (mainModel) {
                const mainBox = new THREE.Box3().setFromObject(mainModel);
                box.union(mainBox);
            }
            
            // 包含所有设备模型
            Object.values(models).forEach(model => {
                if (model) {
                    const modelBox = new THREE.Box3().setFromObject(model);
                    box.union(modelBox);
                }
            });
            
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            
            console.log('所有模型边界尺寸:', size);
            console.log('所有模型中心点:', center);
            
            // 计算合适的相机距离
            const diagonal = Math.sqrt(size.x * size.x + size.y * size.y + size.z * size.z);
            const distance = diagonal * 1.5;
            
            console.log('计算的相机距离:', distance);
            
            // 设置相机位置
            camera.position.set(
                center.x + distance * 0.7,
                center.y + distance * 0.5,
                center.z + distance * 0.7
            );
            
            // 看向中心点
            camera.lookAt(center);
            
            console.log('相机新位置:', camera.position);
        }

            const c = document.getElementById('canvas-container');
            if (!c || !camera || !renderer) return;
            
            const width = c.clientWidth;
            const height = c.clientHeight;
            
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
            
            console.log('窗口大小调整:', width, 'x', height);
        }

        let lastPanelUpdate = 0;
        const panelUpdateInterval = 1000; // 1秒更新一次

        function animate() {
            animationId = requestAnimationFrame(animate);
            controls.update();

            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            
            // 更新模型动画
            if (mixer && isAnimationPlaying) {
                mixer.update(delta);
            }
            
            // 更新网格流光效果
            if (window.gridMaterial) {
                window.gridMaterial.uniforms.time.value = time;
            }

            // 更新面板数据（每1秒更新一次）
            const now = performance.now();
            if (activePanel && now - lastPanelUpdate >= panelUpdateInterval) {
                // 提取设备ID
                const panelId = activePanel.id;
                const deviceId = panelId.replace('panel_', '');
                updatePanelData(deviceId);
                lastPanelUpdate = now;
            }

            // 更新所有悬浮面板的位置
            Object.keys(floatingPanels).forEach(deviceId => {
                const model = models[deviceId];
                if (model) {
                    // 获取模型的中心点
                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    updateFloatingPanelPosition(deviceId, center);
                }
            });

            // 更新状态图标朝向
            updateIconOrientation();

            renderer.render(scene, camera);

            frameCount++;
            if (now - lastFps >= 1000) {
                document.getElementById('fpsDisplay').textContent = frameCount;
                frameCount = 0;
                lastFps = now;
            }
            
            // 更新相机坐标显示
            if (camera && frameCount % 10 === 0) {
                const pos = camera.position;
                const rot = camera.rotation;
                
                // 转换旋转角度为度（更易读）
                const rotDeg = {
                    x: (rot.x * 180 / Math.PI).toFixed(1),
                    y: (rot.y * 180 / Math.PI).toFixed(1),
                    z: (rot.z * 180 / Math.PI).toFixed(1)
                };
                
                // 在页面上显示相机位置
                document.getElementById('cameraPos').textContent = 
                    `${pos.x.toFixed(1)}, ${pos.y.toFixed(1)}, ${pos.z.toFixed(1)}`;
                

            }
        }

        // 更新状态图标朝向，使其始终面向相机
        function updateIconOrientation() {
            deviceConfigs.forEach(device => {
                const model = models[device.id];
                if (model && model.userData.statusIconContainer) {
                    const iconContainer = model.userData.statusIconContainer;
                    iconContainer.lookAt(camera.position);
                }
            });
        }

        // 更新浮动面板状态信息
        function updateFloatingPanelStatus(deviceId) {
            const panel = floatingPanels[deviceId];
            if (!panel) return;
            
            const deviceConfig = deviceConfigs.find(config => config.id === deviceId);
            if (!deviceConfig) return;
            
            // 更新状态指示灯
            const statusIndicator = panel.querySelector('.floating-panel-status');
            if (statusIndicator) {
                let statusColor = '#4ade80'; // 默认绿色
                
                // 设备故障/警告状态优先显示
                if (deviceConfig.status === 'red') {
                    // 故障状态 - 红色
                    statusColor = '#f87171';
                } else if (deviceConfig.status === 'yellow') {
                    // 警告状态 - 黄色
                    statusColor = '#facc15';
                } else {
                    // 正常设备根据系统状态显示
                    if (state.status === 'paused') {
                        statusColor = '#facc15';
                    } else if (state.status === 'stopped' || state.status === 'idle') {
                        statusColor = '#94a3b8';
                    } else {
                        statusColor = '#4ade80';
                    }
                }
                
                statusIndicator.style.background = statusColor;
                statusIndicator.style.boxShadow = `0 0 8px ${statusColor}`;
            }
            
            // 检查并更新处理故障按钮
            const fixButton = panel.querySelector('.fix-fault-btn');
            if (fixButton) {
                if (deviceConfig.status === 'red' || deviceConfig.status === 'yellow') {
                    fixButton.style.display = 'inline-block';
                } else {
                    fixButton.style.display = 'none';
                }
            }
            
            // 更新状态文本
            const statusTextElement = panel.querySelector('.floating-panel-title + span');
            if (statusTextElement) {
                let statusText = '正常';
                
                // 设备故障/警告状态优先显示
                if (deviceConfig.status === 'red') {
                    statusText = '故障';
                } else if (deviceConfig.status === 'yellow') {
                    statusText = '警告';
                } else {
                    // 正常设备根据系统状态显示
                    if (state.status === 'paused') {
                        statusText = '待机';
                    } else if (state.status === 'stopped' || state.status === 'idle') {
                        statusText = '停机';
                    } else {
                        statusText = '正常';
                    }
                }
                
                statusTextElement.textContent = statusText;
            }
        }

        // 测试故障函数 - 随机选取设备设置为故障状态
        function testRandomFault() {
            console.log('测试故障按钮被点击');
            
            // 随机选择1-3个设备
            const faultCount = Math.floor(Math.random() * 3) + 1;
            const availableDevices = deviceConfigs.filter(d => d.status === 'green');
            
            if (availableDevices.length === 0) {
                console.log('没有可设置为故障的设备');
                addAlarm('没有可设置为故障的设备', 'info');
                return;
            }
            
            // 随机打乱数组并取前faultCount个
            const shuffled = availableDevices.sort(() => Math.random() - 0.5);
            const selectedDevices = shuffled.slice(0, Math.min(faultCount, shuffled.length));
            
            selectedDevices.forEach(device => {
                // 只设置为故障状态
                const newStatus = 'red';
                const statusText = '故障';
                const alarmType = 'error';
                
                // 更新设备状态
                device.status = newStatus;
                
                // 同步更新 deviceLastStatus，防止重复记录报警
                state.deviceLastStatus[device.id] = newStatus;
                
                // 记录设备类型
                const deviceType = device.id.startsWith('CZK') ? '抽真空机' : '灌注机';
                
                // 添加报警记录
                addAlarm(`${device.name} (${deviceType}) ${statusText}`, alarmType);
                
                console.log(`设备 ${device.name} 被设置为${statusText}状态`);
            });
            
            // 应用全息效果
            applyDeviceHologramEffects();
            
            // 更新设备状态图标
            selectedDevices.forEach(device => {
                updateDeviceStatusIcon(device);
                updateFloatingPanelStatus(device.id);
            });
            
            // 执行开始灌注流程
            startPerfuse();
        }

        function startPerfuse() {
            console.log('开始灌注按钮被点击');
            if (state.status === 'running') {
                console.log('已经在运行状态，跳过');
                return;
            }
            
            const wasPaused = state.status === 'paused';
            
            state.status = 'running';
            state.vacuumPump = true;
            state.perfusionPump = true;
            state.v1 = true;
            state.v2 = true;
            if (!wasPaused) {
                state.startTime = Date.now();
            }
            state.phase = '灌注中';
            refreshUI();
            
            // 播放模型动画
            console.log('播放模型动画:', mixer, animationActions.length);
            if (mixer && animationActions.length > 0) {
                if (!wasPaused) {
                    console.log('停止所有动作');
                    animationActions.forEach((action, index) => {
                        console.log('停止动作', index);
                        try {
                            if (action && action.stop) {
                                action.stop();
                            } else {
                                console.error('无效的动作对象:', action);
                            }
                        } catch (e) {
                            console.error('停止动作失败:', e);
                        }
                    });
                    console.log('播放所有动作');
                    animationActions.forEach((action, index) => {
                        console.log('播放动作', index);
                        try {
                            if (action && action.play) {
                                action.play();
                            } else {
                                console.error('无效的动作对象:', action);
                            }
                        } catch (e) {
                            console.error('播放动作失败:', e);
                        }
                    });
                } else {
                    console.log('从暂停状态继续播放动画');
                }
                isAnimationPlaying = true;
                console.log('模型动画已开始播放，isAnimationPlaying:', isAnimationPlaying);
            } else {
                console.log('没有动画可以播放');
            }
            
            // 更新所有设备状态图标和浮动面板状态
            deviceConfigs.forEach(device => {
                updateDeviceStatusIcon(device);
                updateFloatingPanelStatus(device.id);
            });
        }

        function pausePerfuse() {
            console.log('暂停灌注按钮被点击');
            if (state.status !== 'running') {
                console.log('不在运行状态，跳过');
                return;
            }
            state.status = 'paused';
            state.vacuumPump = false;
            state.perfusionPump = false;
            state.phase = '已暂停';
            refreshUI();
            
            // 暂停模型动画
            console.log('暂停模型动画:', mixer, animationActions.length);
            if (mixer && animationActions.length > 0) {
                console.log('设置动画状态为暂停');
                // 直接设置 isAnimationPlaying 为 false，停止动画更新
                isAnimationPlaying = false;
                console.log('模型动画已暂停，isAnimationPlaying:', isAnimationPlaying);
            } else {
                console.log('没有动画可以暂停');
            }
            
            // 更新所有设备状态图标和浮动面板状态
            deviceConfigs.forEach(device => {
                updateDeviceStatusIcon(device);
                updateFloatingPanelStatus(device.id);
            });
        }

        function stopPerfuse() {
            console.log('停止灌注按钮被点击');
            state.status = 'stopped';
            state.vacuumPump = false;
            state.perfusionPump = false;
            state.v1 = false;
            state.v2 = false;
            state.v3 = false;
            state.phase = '已停止';
            refreshUI();
            
            // 复位所有设备状态为正常
            deviceConfigs.forEach(device => {
                device.status = 'green';
                state.deviceLastStatus[device.id] = 'green';
            });
            applyDeviceHologramEffects();
            addAlarm('所有设备状态已复位', 'info');
            console.log('所有设备状态已复位');
            
            // 复位模型动画
            console.log('复位模型动画:', mixer, animationActions.length);
            if (mixer && animationActions.length > 0) {
                console.log('停止所有动作');
                animationActions.forEach((action, index) => {
                    console.log('停止动作', index);
                    try {
                        if (action && action.stop) {
                            action.stop();
                        } else {
                            console.error('无效的动作对象:', action);
                        }
                    } catch (e) {
                        console.error('停止动作失败:', e);
                    }
                });
                isAnimationPlaying = false;
                console.log('模型动画已复位，isAnimationPlaying:', isAnimationPlaying);
            } else {
                console.log('没有动画可以复位');
            }
            
            // 更新所有设备状态图标和浮动面板状态
            deviceConfigs.forEach(device => {
                updateDeviceStatusIcon(device);
                updateFloatingPanelStatus(device.id);
            });
        }

        function startVacuum() {
            state.vacuumPump = true;
            state.v1 = true;
            state.phase = '抽真空';
            refreshUI();
        }

        function vent() {
            state.v3 = true;
            state.phase = '泄压';
            refreshUI();
        }

        function reset() {
            state.status = 'idle';
            state.vacuumPump = false;
            state.perfusionPump = false;
            state.v1 = false;
            state.v2 = false;
            state.v3 = false;
            state.vacuum = 0;
            state.flow = 0;
            state.temperature = 25;
            state.pressure = 0;
            state.progress = 0;
            state.startTime = null;
            state.elapsed = 0;
            state.phase = '待机';
            refreshUI();
        }

        function updateData() {
            if (state.vacuumPump && state.vacuum > -101.3) {
                state.vacuum = Math.max(-101.3, state.vacuum - (Math.random() * 2 + 0.5));
            } else if (!state.vacuumPump && state.vacuum < 0) {
                state.vacuum = Math.min(0, state.vacuum + (Math.random() * 0.5));
            }

            if (state.perfusionPump && state.status === 'running') {
                state.flow = 50 + Math.random() * 50;
            } else {
                state.flow = Math.max(0, state.flow - (Math.random() * 2 + 1));
            }

            if (state.status === 'running') {
                state.temperature = Math.min(80, state.temperature + (Math.random() * 0.3 - 0.1));
                state.pressure = Math.min(500, state.pressure + (Math.random() * 5 + 2));
                state.progress = Math.min(100, state.progress + (Math.random() * 0.5));
            }

            if (state.v3) {
                state.pressure = Math.max(0, state.pressure - (Math.random() * 10 + 5));
            }

            if (state.startTime) {
                state.elapsed = Math.floor((Date.now() - state.startTime) / 1000);
            }

            checkDeviceAlarms();
            applyDeviceHologramEffects();
            updateDisplays();
        }

        function checkDeviceAlarms() {
            deviceConfigs.forEach(device => {
                const lastStatus = state.deviceLastStatus[device.id];
                const currentStatus = device.status;

                if (currentStatus === 'red' && lastStatus !== currentStatus) {
                    const alarmType = 'error';
                    const deviceType = device.id.startsWith('CZK') ? '抽真空机' : '灌注机';
                    const alarmMsg = `${device.name} (${deviceType}) 故障`;
                    addAlarm(alarmMsg, alarmType);
                }

                state.deviceLastStatus[device.id] = currentStatus;
            });
        }

        function applyDeviceHologramEffects() {
            deviceConfigs.forEach(device => {
                const model = models[device.id];
                if (model) {
                    const currentStatus = device.status;
                    const lastStatus = model.userData.lastStatus;

                    // 初始加载时或状态变化时更新状态
                    if (!lastStatus || currentStatus !== lastStatus) {
                        if (currentStatus === 'green') {
                            // 恢复原始材质（如果之前有保存）
                            if (model.userData.realOriginalMaterial) {
                                // 递归恢复所有子对象的材质
                                restoreOriginalMaterials(model);
                            }

                            // 标记为正常状态
                            model.userData.isFaulty = false;
                        } else if (currentStatus === 'red' || currentStatus === 'yellow') {
                            // 标记为故障/警告状态，但不应用全息效果
                            model.userData.isFaulty = true;
                        }

                        model.userData.lastStatus = currentStatus;
                    }
                }
            });
        }

        // 添加设备状态图标
        function addDeviceStatusIcon(device, model) {
            // 创建图标容器
            const iconContainer = new THREE.Group();
            iconContainer.name = 'statusIconContainer';
            
            // 计算设备的边界盒，确定图标位置
            const box = new THREE.Box3().setFromObject(model);
            const boxSize = new THREE.Vector3();
            box.getSize(boxSize);
            
            // 计算图标位置（设备顶部）
            const iconPosition = new THREE.Vector3(
                box.min.x + (box.max.x - box.min.x) / 2,
                box.max.y + 1, // 高于设备顶部
                box.min.z + (box.max.z - box.min.z) / 2
            );
            
            iconContainer.position.copy(iconPosition);
            
            // 保存图标容器引用
            model.userData.statusIconContainer = iconContainer;
            
            // 添加到场景
            scene.add(iconContainer);
            
            // 创建初始状态图标
            updateDeviceStatusIcon(device);
        }

        // 更新设备状态图标
        function updateDeviceStatusIcon(device) {
            const model = models[device.id];
            if (!model || !model.userData.statusIconContainer) return;
            
            const iconContainer = model.userData.statusIconContainer;
            iconContainer.clear();
            
            // 根据系统状态和设备状态选择图标
            let iconPath;
            
            // 检查设备是否有故障
            const isFaulty = device.status === 'red' || device.status === 'yellow';
            
            // 根据系统状态和设备状态确定图标
            if (isFaulty) {
                // 故障设备始终显示故障图标
                iconPath = 'error.png';
            } else {
                // 正常设备根据系统状态显示不同图标
                switch (state.status) {
                    case 'idle':
                    case 'stopped':
                        iconPath = 'stop.png';
                        break;
                    case 'running':
                        iconPath = 'run.png';
                        break;
                    case 'paused':
                        iconPath = 'standby.png';
                        break;
                    default:
                        iconPath = 'stop.png';
                }
            }
            
            console.log('加载状态图标:', iconPath, '系统状态:', state.status, '设备状态:', device.status);
            
            // 尝试多种路径格式
            const pathsToTry = [
                iconPath,
                './' + iconPath,
                '/' + iconPath,
                encodeURI(iconPath),
                './' + encodeURI(iconPath),
                '/' + encodeURI(iconPath)
            ];
            
            // 尝试加载图片
            loadIconWithFallback(pathsToTry, 0, device, iconContainer);
        }

        // 尝试多种路径加载图标，失败后使用备用方案
        function loadIconWithFallback(paths, index, device, container) {
            if (index >= paths.length) {
                console.error('所有路径都加载失败，使用备用图标');
                // 创建备用图标
                createFallbackIcon(device, container);
                return;
            }
            
            const currentPath = paths[index];
            console.log('尝试加载:', currentPath);
            
            const textureLoader = new THREE.TextureLoader();
            textureLoader.load(
                currentPath,
                (texture) => {
                    console.log('图片加载成功:', currentPath);
                    // 创建平面几何体
                    const geometry = new THREE.PlaneGeometry(1, 1);
                    const material = new THREE.MeshBasicMaterial({
                        map: texture,
                        transparent: true,
                        side: THREE.DoubleSide,
                        depthWrite: false
                    });
                    
                    const iconMesh = new THREE.Mesh(geometry, material);
                    iconMesh.name = 'statusIcon';
                    
                    // 调整大小和位置
                    iconMesh.scale.set(0.5, 0.5, 1);
                    iconMesh.position.y = 0;
                    
                    container.add(iconMesh);
                },
                undefined,
                (error) => {
                    console.error('加载失败:', currentPath, error);
                    // 尝试下一个路径
                    loadIconWithFallback(paths, index + 1, device, container);
                }
            );
        }

        // 创建备用图标
        function createFallbackIcon(device, container) {
            // 创建一个简单的几何体作为备用
            const geometry = new THREE.SphereGeometry(0.2, 8, 8);
            const material = new THREE.MeshBasicMaterial({
                color: device.status === 'green' ? 0x4ade80 : 
                       device.status === 'red' ? 0xef4444 : 0xf59e0b
            });
            const iconMesh = new THREE.Mesh(geometry, material);
            iconMesh.name = 'statusIcon';
            container.add(iconMesh);
        }

        function saveOriginalMaterials(object) {
            if (object.material) {
                object.userData.realOriginalMaterial = object.material;
            }
            if (object.children) {
                object.children.forEach(child => {
                    saveOriginalMaterials(child);
                });
            }
        }

        function saveHoverOriginalMaterials(object) {
            if (object.material) {
                object.userData.hoverOriginalMaterial = object.material;
            }
            if (object.children) {
                object.children.forEach(child => {
                    saveHoverOriginalMaterials(child);
                });
            }
        }

        function restoreOriginalMaterials(object) {
            if (object.userData.realOriginalMaterial) {
                object.material = object.userData.realOriginalMaterial;
            }
            if (object.children) {
                object.children.forEach(child => {
                    restoreOriginalMaterials(child);
                });
            }
        }

        function restoreHoverOriginalMaterials(object) {
            if (object.userData.hoverOriginalMaterial) {
                object.material = object.userData.hoverOriginalMaterial;
            }
            if (object.children) {
                object.children.forEach(child => {
                    restoreHoverOriginalMaterials(child);
                });
            }
        }

        function applyMaterialToChildren(object, material) {
            if (object.material) {
                object.material = material;
            }
            if (object.children) {
                object.children.forEach(child => {
                    applyMaterialToChildren(child, material);
                });
            }
        }

        function handleDeviceFault(deviceId) {
            const deviceConfig = deviceConfigs.find(config => config.id === deviceId);
            if (deviceConfig) {
                // 记录设备类型
                const deviceType = deviceId.startsWith('CZK') ? '抽真空机' : '灌注机';
                
                // 更改设备状态为正常
                const oldStatus = deviceConfig.status;
                deviceConfig.status = 'green';
                
                // 应用全息效果更新
                applyDeviceHologramEffects();
                
                // 更新设备状态图标
                updateDeviceStatusIcon(deviceConfig);
                
                // 更新浮动面板状态
                updateFloatingPanelStatus(deviceId);
                
                // 添加处理完成的报警记录
                const alarmMsg = `${deviceConfig.name} (${deviceType}) 故障已处理`;
                addAlarm(alarmMsg, 'info');
                
                console.log(`设备 ${deviceConfig.name} 故障已处理，状态已恢复正常`);
            }
        }

        function updateDisplays() {
            document.getElementById('vacuumVal').innerHTML = state.vacuum.toFixed(1) + '<span class="unit">kPa</span>';
            document.getElementById('flowVal').innerHTML = state.flow.toFixed(1) + '<span class="unit">L/min</span>';
            document.getElementById('tempVal').innerHTML = state.temperature.toFixed(1) + '<span class="unit">℃</span>';
            document.getElementById('pressureVal').innerHTML = state.pressure.toFixed(1) + '<span class="unit">kPa</span>';

            document.getElementById('vacuumGaugeNum').textContent = state.vacuum.toFixed(1);
            document.getElementById('flowGaugeNum').textContent = state.flow.toFixed(1);
            document.getElementById('tempGaugeNum').textContent = state.temperature.toFixed(1);
            document.getElementById('pressureGaugeNum').textContent = state.pressure.toFixed(1);

            // 更新进度条宽度
            document.getElementById('vacuumBarFill').style.width = Math.min(100, Math.abs(state.vacuum) / 101.3 * 100) + '%';
            document.getElementById('flowBarFill').style.width = Math.min(100, state.flow / 100 * 100) + '%';
            document.getElementById('tempBarFill').style.width = Math.min(100, (state.temperature - 20) / 60 * 100) + '%';
            document.getElementById('pressureBarFill').style.width = Math.min(100, state.pressure / 500 * 100) + '%';
            
            // 更新设备状态统计栏
            updateDeviceStats();
        }
        
        function updateDeviceStats() {
            // 真空泵状态
            const vacuumIcon = document.getElementById('statVacuumIcon');
            const vacuumValue = document.getElementById('statVacuum');
            if (state.vacuumPump) {
                vacuumIcon.className = 'device-stat-icon running';
                vacuumValue.textContent = '运行中';
                vacuumValue.style.color = 'var(--green-glow)';
            } else {
                vacuumIcon.className = 'device-stat-icon';
                vacuumIcon.style.background = 'rgba(100, 116, 139, 0.2)';
                vacuumIcon.style.color = 'var(--text-dim)';
                vacuumValue.textContent = '停止';
                vacuumValue.style.color = 'var(--text-dim)';
            }
            
            // 灌注泵状态
            const pumpIcon = document.getElementById('statPumpIcon');
            const pumpValue = document.getElementById('statPump');
            if (state.perfusionPump && state.status === 'running') {
                pumpIcon.className = 'device-stat-icon running';
                pumpValue.textContent = '运行中';
                pumpValue.style.color = 'var(--green-glow)';
            } else if (state.perfusionPump) {
                pumpIcon.className = 'device-stat-icon warning';
                pumpValue.textContent = '待机';
                pumpValue.style.color = 'var(--yellow-glow)';
            } else {
                pumpIcon.className = 'device-stat-icon';
                pumpIcon.style.background = 'rgba(100, 116, 139, 0.2)';
                pumpIcon.style.color = 'var(--text-dim)';
                pumpValue.textContent = '停止';
                pumpValue.style.color = 'var(--text-dim)';
            }
            
            // 阀门状态
            const valveIcon = document.getElementById('statValveIcon');
            const valveValue = document.getElementById('statValve');
            const activeValves = [state.v1, state.v2, state.v3].filter(v => v).length;
            if (activeValves === 3) {
                valveIcon.className = 'device-stat-icon running';
                valveValue.textContent = '全开';
                valveValue.style.color = 'var(--green-glow)';
            } else if (activeValves > 0) {
                valveIcon.className = 'device-stat-icon warning';
                valveValue.textContent = `${activeValves}/3 开`;
                valveValue.style.color = 'var(--yellow-glow)';
            } else {
                valveIcon.className = 'device-stat-icon';
                valveIcon.style.background = 'rgba(100, 116, 139, 0.2)';
                valveIcon.style.color = 'var(--text-dim)';
                valveValue.textContent = '全关';
                valveValue.style.color = 'var(--text-dim)';
            }
            
            // 系统温度
            const tempIcon = document.getElementById('statTempIcon');
            const tempValue = document.getElementById('statTemp');
            tempValue.textContent = state.temperature.toFixed(1) + '°C';
            if (state.temperature > 60) {
                tempIcon.className = 'device-stat-icon error';
                tempValue.style.color = 'var(--red-glow)';
            } else if (state.temperature > 45) {
                tempIcon.className = 'device-stat-icon warning';
                tempValue.style.color = 'var(--yellow-glow)';
            } else {
                tempIcon.className = 'device-stat-icon running';
                tempValue.style.color = 'var(--green-glow)';
            }
        }

        function refreshUI() {
            const orb = document.getElementById('systemOrb');
            orb.className = 'status-orb';
            if (state.status === 'running') {
                orb.classList.add('active');
                document.getElementById('systemOrbText').textContent = '运行中';
            } else if (state.status === 'paused') {
                orb.classList.add('warning');
                document.getElementById('systemOrbText').textContent = '已暂停';
            } else if (state.status === 'stopped') {
                orb.classList.add('error');
                document.getElementById('systemOrbText').textContent = '已停止';
            } else {
                document.getElementById('systemOrbText').textContent = '系统待机';
            }

            // 更新设备状态统计
            const normalCount = deviceConfigs.filter(d => d.status === 'green' && state.status !== 'paused').length;
            const pausedCount = deviceConfigs.filter(d => d.status === 'green' && state.status === 'paused').length;
            const warningCount = deviceConfigs.filter(d => d.status === 'yellow').length;
            const faultCount = deviceConfigs.filter(d => d.status === 'red').length;
            const stoppedCount = deviceConfigs.filter(d => d.status === 'gray' || d.status === 'offline').length;

            document.getElementById('statusNormalCount').textContent = normalCount;
            document.getElementById('statusPausedCount').textContent = pausedCount;
            document.getElementById('statusFaultCount').textContent = faultCount;
            document.getElementById('statusStoppedCount').textContent = stoppedCount;

            document.getElementById('btnStart').classList.toggle('on', state.status === 'running');
            document.getElementById('btnPause').classList.toggle('on', state.status === 'paused');
            document.getElementById('btnStop').classList.toggle('on', state.status === 'stopped');
            document.getElementById('btnVacuum').classList.toggle('on', state.vacuumPump);
            document.getElementById('btnVent').classList.toggle('on', state.v3);
        }

        function addAlarm(msg, type) {
            // 添加所有类型的报警记录
            state.alarms.unshift({ time: new Date().toLocaleTimeString('zh-CN'), msg, type });
            if (state.alarms.length > 10) state.alarms.pop();
            state.alarmCount++;
            document.getElementById('alarmCount').textContent = state.alarmCount;
            const log = document.getElementById('alarmLog');
            log.innerHTML = state.alarms.map(a => `
                <div class="alarm-entry ${a.type}">
                    <div class="alarm-time">${a.time}</div>
                    <div class="alarm-desc">${a.msg}</div>
                </div>
            `).join('');
        }

        // 绑定自动旋转控制按钮事件
        function setupAutoRotateControl() {
            const rotateBtn = document.getElementById('toggleRotateBtn');
            
            if (rotateBtn) {
                rotateBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    if (controls) {
                        controls.autoRotate = !controls.autoRotate;
                        
                        if (controls.autoRotate) {
                            rotateBtn.classList.add('active');
                            rotateBtn.innerHTML = '<span class="rotate-icon">🔄</span><span>停止旋转</span>';
                            console.log('自动旋转已启动');
                        } else {
                            rotateBtn.classList.remove('active');
                            rotateBtn.innerHTML = '<span class="rotate-icon">🔄</span><span>开始旋转</span>';
                            console.log('自动旋转已停止');
                        }
                    }
                });
            } else {
                console.warn('自动旋转控制按钮未找到');
            }
        }

        // 重写init函数，添加自动旋转控制
        const originalInit = init;
        init = function() {
            originalInit();
            
            // 设置自动旋转控制
            setupAutoRotateControl();
        };
        
        // 页面加载完成后初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
