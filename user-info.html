<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息 - 抽真空灌注段监控系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/user-info.css">
</head>
<body class="user-info-page">
    <!-- 顶部导航栏 -->
    <header class="page-header">
        <div class="header-left">
            <a href="index.html" class="back-btn">
                <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                <span>返回系统</span>
            </a>
        </div>
        <div class="header-center">
            <h1 class="page-title">个人信息管理</h1>
        </div>
        <div class="header-right">
            <div class="user-info" id="userInfo">
                <div class="user-avatar">U</div>
                <span class="username" id="displayUsername">操作员</span>
                <svg class="dropdown-arrow" viewBox="0 0 24 24" width="16" height="16">
                    <path fill="currentColor" d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
                </svg>
                <div class="user-dropdown" id="userDropdown">
                    <a href="#" class="dropdown-item active">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                        <span>个人信息</span>
                    </a>
                    <div class="dropdown-divider"></div>
                    <a href="index.html" class="dropdown-item logout-btn" id="logoutBtn">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
                        <span>退出登录</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- 主要内容区域 -->
    <main class="main-content">
        <!-- 用户信息卡片 -->
        <div class="info-container">
            <!-- 左侧：头像和基本信息 -->
            <div class="profile-card">
                <div class="avatar-section">
                    <div class="large-avatar" id="userAvatar">U</div>
                    <button class="change-avatar-btn" id="changeAvatarBtn">更换头像</button>
                </div>
                
                <div class="basic-info">
                    <h2 class="user-name" id="userName">操作员</h2>
                    <p class="user-role" id="userRole">系统操作员</p>
                    <p class="user-id" id="userId">工号: CZK20240001</p>
                    
                    <div class="status-badge online">
                        <span class="status-dot"></span>
                        在线
                    </div>
                </div>
            </div>

            <!-- 右侧：详细信息表单 -->
            <div class="details-card">
                <div class="card-header">
                    <h3>账户信息</h3>
                    <button class="edit-btn" id="editBtn">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                        编辑
                    </button>
                </div>

                <form class="info-form" id="infoForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="realName">真实姓名</label>
                            <input type="text" id="realName" value="张三" disabled>
                        </div>
                        <div class="form-group">
                            <label for="phone">手机号码</label>
                            <input type="tel" id="phone" value="138****8888" disabled>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">电子邮箱</label>
                            <input type="email" id="email" value="zhangsan@example.com" disabled>
                        </div>
                        <div class="form-group">
                            <label for="department">所属部门</label>
                            <input type="text" id="department" value="生产部 - 灌注车间" disabled>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="position">职位</label>
                            <input type="text" id="position" value="操作员" disabled>
                        </div>
                        <div class="form-group">
                            <label for="entryDate">入职日期</label>
                            <input type="date" id="entryDate" value="2024-01-15" disabled>
                        </div>
                    </div>

                    <div class="form-actions" id="formActions" style="display: none;">
                        <button type="submit" class="save-btn">保存修改</button>
                        <button type="button" class="cancel-btn" id="cancelBtn">取消</button>
                    </div>
                </form>

                <div class="card-section">
                    <h3>安全设置</h3>
                    <div class="security-items">
                        <div class="security-item">
                            <div class="security-info">
                                <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                                <div>
                                    <p class="security-label">登录密码</p>
                                    <p class="security-value">上次修改: 30天前</p>
                                </div>
                            </div>
                            <button class="action-link" onclick="showChangePasswordModal()">修改密码</button>
                        </div>

                        <div class="security-item">
                            <div class="security-info">
                                <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
                                <div>
                                    <p class="security-label">两步验证</p>
                                    <p class="security-value">未启用</p>
                                </div>
                            </div>
                            <button class="action-link">启用</button>
                        </div>
                    </div>
                </div>

                <div class="card-section">
                    <h3>活动记录</h3>
                    <div class="activity-list">
                        <div class="activity-item">
                            <div class="activity-time">2024-01-15 14:32:15</div>
                            <div class="activity-desc">登录系统</div>
                            <div class="activity-ip">IP: 192.168.1.100</div>
                        </div>
                        <div class="activity-item">
                            <div class="activity-time">2024-01-14 09:15:42</div>
                            <div class="activity-desc">修改个人信息</div>
                            <div class="activity-ip">IP: 192.168.1.100</div>
                        </div>
                        <div class="activity-item">
                            <div class="activity-time">2024-01-10 16:48:33</div>
                            <div class="activity-desc">登录系统</div>
                            <div class="activity-ip">IP: 192.168.1.100</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 修改密码模态框 -->
    <div class="modal-overlay" id="passwordModal">
        <div class="modal-card">
            <div class="modal-header">
                <h3>修改密码</h3>
                <button class="close-modal" id="closeModal">&times;</button>
            </div>
            <form class="modal-form" id="passwordForm">
                <div class="form-group">
                    <label for="currentPassword">当前密码</label>
                    <input type="password" id="currentPassword" placeholder="请输入当前密码" required>
                </div>
                <div class="form-group">
                    <label for="newPassword">新密码</label>
                    <input type="password" id="newPassword" placeholder="请输入新密码（至少6位）" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">确认新密码</label>
                    <input type="password" id="confirmPassword" placeholder="请再次输入新密码" required>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="primary-btn">确认修改</button>
                    <button type="button" class="secondary-btn" id="cancelPassword">取消</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/user-info.js"></script>
</body>
</html>
