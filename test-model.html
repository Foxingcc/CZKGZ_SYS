<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型加载测试</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #canvas-container { width: 100vw; height: 100vh; }
        #test-button { position: fixed; top: 20px; left: 20px; z-index: 1000; padding: 10px; background: #111; color: #00d4ff; border: 1px solid #00d4ff; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <button id="test-button">测试模型加载</button>
    
    <!-- Three.js 核心库 -->
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <!-- GLTFLoader -->
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <!-- DRACOLoader -->
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
    <!-- OrbitControls -->
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        console.log('=== 测试页面加载 ===');
        
        let scene, camera, renderer, controls;
        let model;
        
        function init() {
            console.log('=== 初始化 Three.js ===');
            
            const container = document.getElementById('canvas-container');
            const w = container.clientWidth;
            const h = container.clientHeight;
            
            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            
            // 创建相机
            camera = new THREE.PerspectiveCamera(75, w / h, 0.1, 1000);
            camera.position.set(5, 5, 5);
            camera.lookAt(0, 0, 0);
            
            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(w, h);
            container.appendChild(renderer.domElement);
            
            // 创建控制器
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            
            // 添加光源
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 5);
            scene.add(directionalLight);
            
            // 添加网格地面
            const gridHelper = new THREE.GridHelper(20, 20);
            scene.add(gridHelper);
            
            // 加载模型
            loadModel();
            
            // 动画循环
            animate();
        }
        
        function loadModel() {
            console.log('=== 开始加载模型 ===');
            
            const loader = new THREE.GLTFLoader();
            const dracoLoader = new THREE.DRACOLoader();
            dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/');
            loader.setDRACOLoader(dracoLoader);
            
            // 尝试加载一个模型
            loader.load(
                './models/CZK_1.glb',
                function (gltf) {
                    console.log('=== 模型加载成功 ===');
                    model = gltf.scene;
                    model.scale.set(10, 10, 10);
                    model.position.set(0, 0, 0);
                    scene.add(model);
                    console.log('模型已添加到场景');
                },
                function (xhr) {
                    if (xhr.lengthComputable) {
                        const percentComplete = (xhr.loaded / xhr.total * 100).toFixed(2);
                        console.log('模型加载进度:', percentComplete + '%');
                    }
                },
                function (error) {
                    console.error('模型加载失败:', error);
                }
            );
        }
        
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        
        // 测试按钮点击事件
        document.getElementById('test-button').addEventListener('click', function() {
            console.log('=== 测试模型加载状态 ===');
            console.log('场景:', scene ? '已创建' : '未创建');
            console.log('相机:', camera ? '已创建' : '未创建');
            console.log('渲染器:', renderer ? '已创建' : '未创建');
            console.log('模型:', model ? '已加载' : '未加载');
        });
        
        // 页面加载完成后初始化
        window.addEventListener('load', init);
    </script>
</body>
</html>
